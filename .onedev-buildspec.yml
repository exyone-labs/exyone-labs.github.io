version: 1

jobs:
- name: build
  image: ruby:3.4
  timeout: 900
  environment:
    JEKYLL_ENV: production
    BUNDLE_PATH: /bundle
  steps:
  - checkout: {}
  - use-cache:
      key: gems-${{ job.commit }}-${{ checksum "Gemfile.lock" }}
      path: /bundle
      restore: true
  - command:
      command: |
        bundle config set --local path $BUNDLE_PATH
        bundle install --jobs $(nproc)
  - command:
      command: bundle exec jekyll build
  - command:
      command: |
        bundle exec htmlproofer _site --disable-external --ignore-urls "/^http://127\\.0\\.0\\.1/,/^http://0\\.0\\.0\\.0/,/^http://localhost/"
      ignoreFailure: true
  - use-cache:
      key: gems-${{ job.commit }}-${{ checksum "Gemfile.lock" }}
      path: /bundle
      save: true
  - publish:
      path: _site
      artifact: site

triggers:
- branch: $default-branch
  type: branch-updated
