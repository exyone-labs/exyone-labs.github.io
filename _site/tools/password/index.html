<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .password-display {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 1.5rem;
      letter-spacing: 2px;
      word-break: break-all;
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 0.5rem;
      transition: all 0.3s ease;
    }
    .strength-weak { background: linear-gradient(90deg, #f44336 33%, transparent 33%); }
    .strength-medium { background: linear-gradient(90deg, #ff9800 66%, transparent 66%); }
    .strength-strong { background: linear-gradient(90deg, #4caf50 100%, transparent 100%); }
    .char-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .char-option label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .char-preview {
      font-family: monospace;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>密码生成器</h1>
      <p>生成安全的随机密码</p>
    </div>

    <div class="card">
      <div class="card-title">生成的密码</div>
      <div id="passwordDisplay" class="password-display">点击生成按钮</div>
      <div id="strengthBar" class="strength-bar"></div>
      <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
        <span>长度: <strong id="lengthDisplay">16</strong></span>
        <span id="strengthText">强度: -</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">配置</div>
      
      <div style="margin-bottom: 1rem;">
        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">
          密码长度: <span id="lengthValue">16</span>
        </label>
        <input type="range" id="length" min="6" max="64" value="16" style="width: 100%;" oninput="updateLength()">
      </div>

      <div class="char-option">
        <label>
          <input type="checkbox" id="lowercase" checked>
          小写字母 (a-z)
        </label>
        <span class="char-preview">abcdefghijklmnopqrstuvwxyz</span>
      </div>
      
      <div class="char-option">
        <label>
          <input type="checkbox" id="uppercase" checked>
          大写字母 (A-Z)
        </label>
        <span class="char-preview">ABCDEFGHIJKLMNOPQRSTUVWXYZ</span>
      </div>
      
      <div class="char-option">
        <label>
          <input type="checkbox" id="numbers" checked>
          数字 (0-9)
        </label>
        <span class="char-preview">0123456789</span>
      </div>
      
      <div class="char-option">
        <label>
          <input type="checkbox" id="symbols" checked>
          特殊符号
        </label>
        <span class="char-preview">!@#$%^&*()_+-=[]{}|;:,.<>?</span>
      </div>
      
      <div class="char-option">
        <label>
          <input type="checkbox" id="ambiguous">
          排除易混淆字符 (0O1lI)
        </label>
      </div>

      <div class="btn-group" style="margin-top: 1rem;">
        <button class="btn btn-primary" onclick="generatePassword()">生成密码</button>
        <button class="btn btn-secondary" onclick="generateMultiple()">生成 10 个</button>
        <button class="btn btn-secondary" onclick="copyPassword()">复制密码</button>
      </div>
    </div>

    <div class="card" id="multipleCard" style="display: none;">
      <div class="card-title">批量生成的密码</div>
      <div id="multiplePasswords" style="font-family: monospace; line-height: 2;"></div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    const charSets = {
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    const ambiguousChars = '0O1lI';

    function updateLength() {
      const length = document.getElementById('length').value;
      document.getElementById('lengthValue').textContent = length;
      document.getElementById('lengthDisplay').textContent = length;
    }

    function getCharSet() {
      let chars = '';
      if (document.getElementById('lowercase').checked) chars += charSets.lowercase;
      if (document.getElementById('uppercase').checked) chars += charSets.uppercase;
      if (document.getElementById('numbers').checked) chars += charSets.numbers;
      if (document.getElementById('symbols').checked) chars += charSets.symbols;
      
      if (document.getElementById('ambiguous').checked) {
        chars = chars.split('').filter(c => !ambiguousChars.includes(c)).join('');
      }
      
      return chars;
    }

    function generatePassword() {
      const chars = getCharSet();
      const length = parseInt(document.getElementById('length').value);
      const display = document.getElementById('passwordDisplay');
      
      if (!chars) {
        display.textContent = '请至少选择一种字符类型';
        return;
      }
      
      let password = '';
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += chars[array[i] % chars.length];
      }
      
      display.textContent = password;
      updateStrength(password);
      
      document.getElementById('multipleCard').style.display = 'none';
    }

    function generateMultiple() {
      const chars = getCharSet();
      const length = parseInt(document.getElementById('length').value);
      const container = document.getElementById('multiplePasswords');
      
      if (!chars) {
        return;
      }
      
      let html = '';
      for (let i = 0; i < 10; i++) {
        let password = '';
        const array = new Uint32Array(length);
        crypto.getRandomValues(array);
        
        for (let j = 0; j < length; j++) {
          password += chars[array[j] % chars.length];
        }
        
        html += `<div style="padding: 0.5rem; background: var(--bg-secondary); border-radius: 4px; margin-bottom: 0.5rem; cursor: pointer;" onclick="copyText('${password}')">${password}</div>`;
      }
      
      container.innerHTML = html;
      document.getElementById('multipleCard').style.display = 'block';
    }

    function updateStrength(password) {
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (password.length >= 16) strength++;
      if (/[a-z]/.test(password)) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      
      if (strength <= 3) {
        bar.className = 'strength-bar strength-weak';
        text.textContent = '强度: 弱';
      } else if (strength <= 5) {
        bar.className = 'strength-bar strength-medium';
        text.textContent = '强度: 中等';
      } else {
        bar.className = 'strength-bar strength-strong';
        text.textContent = '强度: 强';
      }
    }

    function copyPassword() {
      const password = document.getElementById('passwordDisplay').textContent;
      if (password && !password.startsWith('点击') && !password.startsWith('请')) {
        navigator.clipboard.writeText(password).then(() => {
          showToast('已复制密码！');
        });
      }
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制密码！');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    generatePassword();
  </script>
</body>
</html>
