<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 预览 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .md-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      min-height: 500px;
    }
    @media (max-width: 768px) {
      .md-container {
        grid-template-columns: 1fr;
      }
    }
    .md-editor, .md-preview {
      display: flex;
      flex-direction: column;
    }
    .md-editor textarea {
      flex: 1;
      resize: none;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
    }
    .md-preview-content {
      flex: 1;
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
    }
    .md-preview-content h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
    .md-preview-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
    .md-preview-content h3 { font-size: 1.25em; }
    .md-preview-content h4 { font-size: 1em; }
    .md-preview-content p { margin: 1em 0; line-height: 1.8; }
    .md-preview-content code { background: var(--bg-tertiary); padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; }
    .md-preview-content pre { background: var(--bg-tertiary); padding: 1em; border-radius: 6px; overflow-x: auto; }
    .md-preview-content pre code { background: none; padding: 0; }
    .md-preview-content blockquote { border-left: 4px solid var(--accent-color); padding-left: 1em; margin: 1em 0; color: var(--text-secondary); }
    .md-preview-content ul, .md-preview-content ol { padding-left: 2em; margin: 1em 0; }
    .md-preview-content li { margin: 0.5em 0; }
    .md-preview-content a { color: var(--accent-color); text-decoration: none; }
    .md-preview-content a:hover { text-decoration: underline; }
    .md-preview-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    .md-preview-content th, .md-preview-content td { border: 1px solid var(--border-color); padding: 0.5em 1em; }
    .md-preview-content th { background: var(--bg-tertiary); }
    .md-preview-content img { max-width: 100%; }
    .md-preview-content hr { border: none; border-top: 1px solid var(--border-color); margin: 2em 0; }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>Markdown 预览</h1>
      <p>实时编辑和预览 Markdown 文档</p>
    </div>

    <div class="card">
      <div class="btn-group" style="margin-bottom: 1rem;">
        <button class="btn btn-secondary" onclick="insertTemplate('heading')">标题</button>
        <button class="btn btn-secondary" onclick="insertTemplate('bold')">粗体</button>
        <button class="btn btn-secondary" onclick="insertTemplate('italic')">斜体</button>
        <button class="btn btn-secondary" onclick="insertTemplate('link')">链接</button>
        <button class="btn btn-secondary" onclick="insertTemplate('code')">代码</button>
        <button class="btn btn-secondary" onclick="insertTemplate('list')">列表</button>
        <button class="btn btn-secondary" onclick="insertTemplate('quote')">引用</button>
        <button class="btn btn-secondary" onclick="insertTemplate('table')">表格</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        <button class="btn btn-primary" onclick="copyHtml()">复制 HTML</button>
      </div>
    </div>

    <div class="card">
      <div class="md-container">
        <div class="md-editor">
          <div class="card-title">Markdown 编辑器</div>
          <textarea id="editor" placeholder="在这里输入 Markdown..."># Markdown 预览工具

这是一个**实时预览**的 Markdown 编辑器。

## 功能特点

- 实时渲染
- 支持常用语法
- 纯前端实现

### 代码示例

```javascript
function hello() {
  console.log('Hello, World!');
}
```

|------|------|

| 列表 | ✅ |
| 代码 | ✅ |

> 这是一段引用文字

[返回工具箱](../)</textarea>
        </div>
        <div class="md-preview">
          <div class="card-title">预览</div>
          <div id="preview" class="md-preview-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    function parseMarkdown(md) {
      let html = md;
      
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
      
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      
      html = html.replace(/^\> (.*$)/gm, '<blockquote>$1</blockquote>');
      
      html = html.replace(/^\- (.*$)/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      
      html = html.replace(/^\d+\. (.*$)/gm, '<li>$1</li>');
      
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      
      html = html.replace(/^---$/gm, '<hr>');
      
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>(<h[1-6]>)/g, '$1');
      html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1');
      html = html.replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
      html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
      
      return html;
    }

    function renderPreview() {
      const md = document.getElementById('editor').value;
      const preview = document.getElementById('preview');
      preview.innerHTML = parseMarkdown(md);
    }

    function insertTemplate(type) {
      const editor = document.getElementById('editor');
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const selected = editor.value.substring(start, end);
      
      const templates = {
        heading: '## 标题',
        bold: '**粗体文本**',
        italic: '*斜体文本*',
        link: '[链接文字](https://example.com)',
        code: '```\n代码\n```',
        list: '- 列表项',
        quote: '> 引用文字',
        table: '| 列1 | 列2 |\n|-----|-----|\n| 内容 | 内容 |'
      };
      
      const template = templates[type];
      editor.value = editor.value.substring(0, start) + template + editor.value.substring(end);
      editor.focus();
      renderPreview();
    }

    function copyHtml() {
      const html = document.getElementById('preview').innerHTML;
      navigator.clipboard.writeText(html).then(() => {
        showToast('已复制 HTML 代码！');
      });
    }

    function clearAll() {
      document.getElementById('editor').value = '';
      document.getElementById('preview').innerHTML = '';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    document.getElementById('editor').addEventListener('input', renderPreview);
    renderPreview();
  </script>
</body>
</html>
