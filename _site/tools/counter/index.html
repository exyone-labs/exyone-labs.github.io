<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字数统计 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .stat-box {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-color);
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    .detail-list {
      margin-top: 1rem;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    .detail-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>字数统计</h1>
      <p>统计文本的字符数、单词数、行数等信息</p>
    </div>

    <div class="card">
      <div class="card-title">输入文本</div>
      <textarea id="input" placeholder="输入或粘贴文本进行统计..." style="min-height: 200px;"></textarea>
      
      <div class="btn-group" style="margin-top: 1rem;">
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">统计概览</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="charCount">0</div>
          <div class="stat-label">字符数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="charNoSpace">0</div>
          <div class="stat-label">字符(不含空格)</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="wordCount">0</div>
          <div class="stat-label">单词数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="chineseCount">0</div>
          <div class="stat-label">中文字数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="lineCount">0</div>
          <div class="stat-label">行数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="paragraphCount">0</div>
          <div class="stat-label">段落数</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">详细统计</div>
      <div class="detail-list">
        <div class="detail-item">
          <span>英文字母</span>
          <span id="letterCount">0</span>
        </div>
        <div class="detail-item">
          <span>数字</span>
          <span id="numberCount">0</span>
        </div>
        <div class="detail-item">
          <span>中文标点</span>
          <span id="chinesePunctuation">0</span>
        </div>
        <div class="detail-item">
          <span>英文标点</span>
          <span id="englishPunctuation">0</span>
        </div>
        <div class="detail-item">
          <span>空格</span>
          <span id="spaceCount">0</span>
        </div>
        <div class="detail-item">
          <span>制表符</span>
          <span id="tabCount">0</span>
        </div>
        <div class="detail-item">
          <span>换行符</span>
          <span id="newlineCount">0</span>
        </div>
        <div class="detail-item">
          <span>其他字符</span>
          <span id="otherCount">0</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">阅读时间估算</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
        <div class="stat-box">
          <div class="stat-value" id="readTimeCn">0</div>
          <div class="stat-label">分钟 (中文)</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="readTimeEn">0</div>
          <div class="stat-label">分钟 (英文)</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="speakTime">0</div>
          <div class="stat-label">分钟 (朗读)</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function countStats() {
      const text = document.getElementById('input').value;
      
      const charCount = text.length;
      const charNoSpace = text.replace(/\s/g, '').length;
      const lineCount = text ? text.split('\n').length : 0;
      const paragraphCount = text ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      
      const chineseChars = text.match(/[\u4e00-\u9fa5]/g) || [];
      const chineseCount = chineseChars.length;
      
      const words = text.match(/[a-zA-Z]+/g) || [];
      const wordCount = words.length;
      
      const letters = text.match(/[a-zA-Z]/g) || [];
      const letterCount = letters.length;
      
      const numbers = text.match(/[0-9]/g) || [];
      const numberCount = numbers.length;
      
      const chinesePunc = text.match(/[，。！？、；：""''（）【】《》]/g) || [];
      const englishPunc = text.match(/[,.!?;:'"()\[\]{}<>]/g) || [];
      
      const spaces = text.match(/ /g) || [];
      const tabs = text.match(/\t/g) || [];
      const newlines = text.match(/\n/g) || [];
      
      const knownChars = letterCount + numberCount + chineseCount + 
                        chinesePunc.length + englishPunc.length + 
                        spaces.length + tabs.length + newlines.length;
      const otherCount = charCount - knownChars;
      
      document.getElementById('charCount').textContent = charCount;
      document.getElementById('charNoSpace').textContent = charNoSpace;
      document.getElementById('wordCount').textContent = wordCount;
      document.getElementById('chineseCount').textContent = chineseCount;
      document.getElementById('lineCount').textContent = lineCount;
      document.getElementById('paragraphCount').textContent = paragraphCount;
      
      document.getElementById('letterCount').textContent = letterCount;
      document.getElementById('numberCount').textContent = numberCount;
      document.getElementById('chinesePunctuation').textContent = chinesePunc.length;
      document.getElementById('englishPunctuation').textContent = englishPunc.length;
      document.getElementById('spaceCount').textContent = spaces.length;
      document.getElementById('tabCount').textContent = tabs.length;
      document.getElementById('newlineCount').textContent = newlines.length;
      document.getElementById('otherCount').textContent = Math.max(0, otherCount);
      
      const readTimeCn = Math.ceil(chineseCount / 300);
      const readTimeEn = Math.ceil(wordCount / 200);
      const speakTime = Math.ceil((chineseCount + wordCount) / 150);
      
      document.getElementById('readTimeCn').textContent = readTimeCn;
      document.getElementById('readTimeEn').textContent = readTimeEn;
      document.getElementById('speakTime').textContent = speakTime;
    }

    function clearAll() {
      document.getElementById('input').value = '';
      countStats();
    }

    document.getElementById('input').addEventListener('input', countStats);
    countStats();
  </script>
</body>
</html>
