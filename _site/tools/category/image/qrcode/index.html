<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生�?- Developer Tools</title>
  <link rel="stylesheet" href="/assets/css/tools.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    .qr-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .qr-preview {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .qr-preview canvas, .qr-preview svg {
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  

<script>
    const toolId = 'qrcode';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('tools.qrcode.content')}</div>
            <textarea id="content" placeholder="输入二维码内�?.." oninput="generate()"></textarea>
            
            <div class="qr-options">
              <div>
                <label>${AppConfig.t('tools.qrcode.size')}:</label>
                <select id="size" onchange="generate()">
                  <option value="4">�?(132px)</option>
                  <option value="6" selected>�?(198px)</option>
                  <option value="8">�?(264px)</option>
                  <option value="10">超大 (330px)</option>
                </select>
              </div>
              <div>
                <label>容错级别:</label>
                <select id="errorLevel" onchange="generate()">
                  <option value="L">L (7%)</option>
                  <option value="M" selected>M (15%)</option>
                  <option value="Q">Q (25%)</option>
                  <option value="H">H (30%)</option>
                </select>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.result')}</div>
            <div id="qrPreview" class="qr-preview"></div>
            <div class="btn-group" style="margin-top: 1rem;">
              <button class="btn btn-secondary" onclick="downloadPng()">${AppConfig.t('tools.qrcode.downloadPng')}</button>
              <button class="btn btn-secondary" onclick="downloadSvg()">${AppConfig.t('tools.qrcode.downloadSvg')}</button>
            </div>
          </div>
        </div>
      `;
    }

    function generate() {
      const content = document.getElementById('content').value;
      const size = parseInt(document.getElementById('size').value);
      const errorLevel = document.getElementById('errorLevel').value;
      const preview = document.getElementById('qrPreview');

      if (!content) {
        preview.innerHTML = '<div style="color: var(--text-secondary);">输入内容生成二维�?/div>';
        return;
      }

      try {
        const qr = qrcode(0, errorLevel);
        qr.addData(content);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const cellSize = size;
        const margin = cellSize;
        const totalSize = moduleCount * cellSize + margin * 2;

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}">`;
        svg += `<rect width="${totalSize}" height="${totalSize}" fill="white"/>`;

        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              svg += `<rect x="${margin + col * cellSize}" y="${margin + row * cellSize}" width="${cellSize}" height="${cellSize}" fill="black"/>`;
            }
          }
        }

        svg += '</svg>';
        preview.innerHTML = svg;
      } catch (e) {
        preview.innerHTML = `<div class="output error">生成失败: ${e.message}</div>`;
      }
    }

    function downloadPng() {
      const svg = document.querySelector('#qrPreview svg');
      if (!svg) {
        UI.toast('请先生成二维�?);
        return;
      }

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const svgData = new XMLSerializer().serializeToString(svg);
      const img = new Image();

      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }

    function downloadSvg() {
      const svg = document.querySelector('#qrPreview svg');
      if (!svg) {
        UI.toast('请先生成二维�?);
        return;
      }

      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'qrcode.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
    }

    init();
  </script>


</body>
</html>
