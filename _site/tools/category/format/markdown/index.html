<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 预览 - Developer Tools</title>
  <link rel="stylesheet" href="/assets/css/tools.css">
  <style>
    .editor-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 768px) {
      .editor-container {
        grid-template-columns: 1fr;
      }
    }
    .editor-panel {
      display: flex;
      flex-direction: column;
    }
    .editor-panel textarea {
      flex: 1;
      min-height: 400px;
      resize: vertical;
    }
    .preview-panel {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 1rem;
      min-height: 400px;
      overflow: auto;
    }
    .preview-panel h1 { font-size: 2rem; margin: 1rem 0 0.5rem; }
    .preview-panel h2 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    .preview-panel h3 { font-size: 1.25rem; margin: 1rem 0 0.5rem; }
    .preview-panel p { margin: 0.5rem 0; line-height: 1.6; }
    .preview-panel code { background: var(--bg-tertiary); padding: 0.2rem 0.4rem; border-radius: 4px; }
    .preview-panel pre { background: var(--bg-tertiary); padding: 1rem; border-radius: var(--radius-md); overflow-x: auto; }
    .preview-panel pre code { background: none; padding: 0; }
    .preview-panel ul, .preview-panel ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .preview-panel blockquote { border-left: 4px solid var(--primary-color); padding-left: 1rem; margin: 0.5rem 0; color: var(--text-secondary); }
    .preview-panel a { color: var(--primary-color); }
    .preview-panel img { max-width: 100%; }
    .preview-panel table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; }
    .preview-panel th, .preview-panel td { border: 1px solid var(--border-color); padding: 0.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  

<script>
    const toolId = 'markdown';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="editor-container">
            <div class="editor-panel">
              <div class="card-title">Markdown</div>
              <textarea id="input" placeholder="输入 Markdown 内容..." oninput="renderMarkdown()"></textarea>
            </div>
            <div class="editor-panel">
              <div class="card-title">${AppConfig.t('tools.markdown.preview')}</div>
              <div id="preview" class="preview-panel"></div>
            </div>
          </div>

          <div class="btn-group" style="margin-top: 1rem;">
            <button class="btn btn-secondary" onclick="copyHtml()">${AppConfig.t('tools.markdown.copyHtml')}</button>
            <button class="btn btn-secondary" onclick="clearAll()">${AppConfig.t('common.clear')}</button>
          </div>
        </div>
      `;
    }

    function renderMarkdown() {
      const input = document.getElementById('input').value;
      const preview = document.getElementById('preview');
      preview.innerHTML = parseMarkdown(input);
    }

    function parseMarkdown(text) {
      if (!text) return '';
      
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/~~(.+?)~~/g, '<del>$1</del>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/^- (.*$)/gim, '<li>$1</li>')
        .replace(/^(\d+)\. (.*$)/gim, '<li>$2</li>')
        .replace(/\n/g, '<br>');
      
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      
      return html;
    }

    function copyHtml() {
      const preview = document.getElementById('preview');
      if (preview.innerHTML) {
        UI.copy(preview.innerHTML, 'HTML 已复制制');?);
      }
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('preview').innerHTML = '';
    }

    init();
  </script>


</body>
</html>
