<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字数统计 - Developer Tools</title>
  <link rel="stylesheet" href="/assets/css/tools.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stat-box {
      background: var(--bg-secondary);
      padding: 1.25rem;
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  

<script>
    const toolId = 'counter';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.input')}</div>
            <textarea id="input" placeholder="输入文本进行统计..." oninput="count()"></textarea>
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <div id="chars" class="stat-value">0</div>
              <div class="stat-label">${AppConfig.t('tools.counter.characters')}</div>
            </div>
            <div class="stat-box">
              <div id="charsNoSpace" class="stat-value">0</div>
              <div class="stat-label">${AppConfig.t('tools.counter.charactersNoSpace')}</div>
            </div>
            <div class="stat-box">
              <div id="words" class="stat-value">0</div>
              <div class="stat-label">${AppConfig.t('tools.counter.words')}</div>
            </div>
            <div class="stat-box">
              <div id="lines" class="stat-value">0</div>
              <div class="stat-label">${AppConfig.t('tools.counter.lines')}</div>
            </div>
            <div class="stat-box">
              <div id="chinese" class="stat-value">0</div>
              <div class="stat-label">${AppConfig.t('tools.counter.chinese')}</div>
            </div>
          </div>
        </div>
      `;
    }

    function count() {
      const text = document.getElementById('input').value;
      const stats = Utils.countText(text);

      document.getElementById('chars').textContent = stats.chars;
      document.getElementById('charsNoSpace').textContent = stats.charsNoSpace;
      document.getElementById('words').textContent = stats.words;
      document.getElementById('lines').textContent = stats.lines;
      document.getElementById('chinese').textContent = stats.chinese;
    }

    init();
  </script>


</body>
</html>
