<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成�?- Developer Tools</title>
  <link rel="stylesheet" href="/assets/css/tools.css">
  <style>
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
    .option-item label {
      cursor: pointer;
    }
    .length-control {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .length-control input[type="range"] {
      flex: 1;
    }
    .length-value {
      min-width: 50px;
      text-align: center;
      font-weight: 600;
      color: var(--primary-color);
    }
    .password-output {
      font-family: monospace;
      font-size: 1.1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      word-break: break-all;
      margin-bottom: 0.5rem;
    }
    .password-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .password-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 0.5rem;
    }
    .password-item code {
      flex: 1;
      font-family: monospace;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  

<script>
    const toolId = 'password';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">选项设置</div>
            
            <div class="length-control">
              <label>${AppConfig.t('tools.password.length')}:</label>
              <input type="range" id="length" min="8" max="64" value="16" oninput="updateLength()">
              <span id="lengthValue" class="length-value">16</span>
            </div>
            
            <div class="options-grid">
              <div class="option-item">
                <input type="checkbox" id="upper" checked>
                <label for="upper">${AppConfig.t('tools.password.includeUpper')}</label>
              </div>
              <div class="option-item">
                <input type="checkbox" id="lower" checked>
                <label for="lower">${AppConfig.t('tools.password.includeLower')}</label>
              </div>
              <div class="option-item">
                <input type="checkbox" id="numbers" checked>
                <label for="numbers">${AppConfig.t('tools.password.includeNumber')}</label>
              </div>
              <div class="option-item">
                <input type="checkbox" id="symbols" checked>
                <label for="symbols">${AppConfig.t('tools.password.includeSymbol')}</label>
              </div>
            </div>
            
            <div class="btn-group">
              <button class="btn btn-primary" onclick="generate()">${AppConfig.t('tools.password.generateBtn')}</button>
              <button class="btn btn-secondary" onclick="generateMultiple()">${AppConfig.t('tools.password.generateMultiple')}</button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.result')}</div>
            <div id="output" class="password-output"></div>
            <div id="passwordList" class="password-list"></div>
          </div>
        </div>
      `;
    }

    function updateLength() {
      document.getElementById('lengthValue').textContent = document.getElementById('length').value;
    }

    function generate() {
      const length = parseInt(document.getElementById('length').value);
      const upper = document.getElementById('upper').checked;
      const lower = document.getElementById('lower').checked;
      const numbers = document.getElementById('numbers').checked;
      const symbols = document.getElementById('symbols').checked;

      const password = Utils.generatePassword(length, { upper, lower, numbers, symbols });
      document.getElementById('output').textContent = password;
      document.getElementById('passwordList').innerHTML = '';
    }

    function generateMultiple() {
      const length = parseInt(document.getElementById('length').value);
      const upper = document.getElementById('upper').checked;
      const lower = document.getElementById('lower').checked;
      const numbers = document.getElementById('numbers').checked;
      const symbols = document.getElementById('symbols').checked;

      const passwords = [];
      for (let i = 0; i < 10; i++) {
        passwords.push(Utils.generatePassword(length, { upper, lower, numbers, symbols }));
      }

      document.getElementById('output').textContent = '';
      document.getElementById('passwordList').innerHTML = passwords.map(p => `
        <div class="password-item">
          <code>${p}</code>
          <button class="btn btn-secondary" onclick="UI.copy('${p}')">${AppConfig.t('common.copy')}</button>
        </div>
      `).join('');
    }

    init();
  </script>


</body>
</html>
