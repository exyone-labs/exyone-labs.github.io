<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD5 哈希 - Developer Tools</title>
  <link rel="stylesheet" href="/assets/css/tools.css">
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  

<script>
    const toolId = 'md5';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.input')}</div>
            <textarea id="input" placeholder="输入需要计�?MD5 的文�?.."></textarea>
            
            <div class="btn-group">
              <button class="btn btn-primary" onclick="generate()">${AppConfig.t('common.generate')}</button>
              <button class="btn btn-secondary" onclick="copyResult()">${AppConfig.t('common.copy')}</button>
              <button class="btn btn-secondary" onclick="clearAll()">${AppConfig.t('common.clear')}</button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.result')}</div>
            <div id="output" class="output" style="font-family: monospace; word-break: break-all;"></div>
          </div>
        </div>
      `;
    }

    function generate() {
      const input = document.getElementById('input').value;
      if (!input) {
        UI.setOutput('output', '请输入文本本�?, 'error');
        return;
      }
      const hash = md5(input);
      UI.setOutput('output', hash, 'success');
    }

    function copyResult() {
      const output = document.getElementById('output').textContent;
      if (output && !output.includes('�?)) {
        UI.copy(output);
      }
    }

    function clearAll() {
      document.getElementById('input').value = '';
      UI.clear('output');
    }

    init();
  </script>


</body>
</html>
