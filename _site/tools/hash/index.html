<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多算法哈希 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .hash-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    .hash-label {
      min-width: 100px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .hash-value {
      flex: 1;
      font-family: monospace;
      word-break: break-all;
      font-size: 0.9rem;
    }
    .hash-copy {
      padding: 0.5rem 1rem;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    .hash-copy:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>多算法哈希</h1>
      <p>生成 SHA-1、SHA-256、SHA-512 等多种哈希值</p>
    </div>

    <div class="card">
      <div class="card-title">输入</div>
      <textarea id="input" placeholder="输入要计算哈希的文本..."></textarea>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculateHashes()">计算哈希</button>
        <button class="btn btn-secondary" onclick="copyAll()">复制全部</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">哈希结果</div>
      <div id="results">
        <div style="color: var(--text-secondary); text-align: center; padding: 2rem;">
          输入文本后点击计算
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    async function sha(algorithm, message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest(algorithm, msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function calculateHashes() {
      const input = document.getElementById('input').value;
      const results = document.getElementById('results');
      
      if (!input) {
        results.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 2rem;">请输入文本</div>';
        return;
      }
      
      const algorithms = [
        { name: 'SHA-1', id: 'sha1' },
        { name: 'SHA-256', id: 'sha256' },
        { name: 'SHA-384', id: 'sha384' },
        { name: 'SHA-512', id: 'sha512' }
      ];
      
      let html = '';
      
      for (const algo of algorithms) {
        const hash = await sha(algo.name, input);
        html += `
          <div class="hash-item">
            <span class="hash-label">${algo.name}</span>
            <span class="hash-value" id="${algo.id}">${hash}</span>
            <button class="hash-copy" onclick="copyHash('${algo.id}')">复制</button>
          </div>
        `;
      }
      
      results.innerHTML = html;
    }

    function copyHash(id) {
      const hash = document.getElementById(id).textContent;
      navigator.clipboard.writeText(hash).then(() => {
        showToast('已复制哈希值！');
      });
    }

    async function copyAll() {
      const sha1 = document.getElementById('sha1')?.textContent;
      if (!sha1) {
        showToast('请先计算哈希');
        return;
      }
      
      const sha256 = document.getElementById('sha256').textContent;
      const sha384 = document.getElementById('sha384').textContent;
      const sha512 = document.getElementById('sha512').textContent;
      
      const text = `SHA-1: ${sha1}\nSHA-256: ${sha256}\nSHA-384: ${sha384}\nSHA-512: ${sha512}`;
      
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制全部哈希值！');
      });
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('results').innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 2rem;">输入文本后点击计算</div>';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
