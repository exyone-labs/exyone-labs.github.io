<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片 Base64 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .drop-zone {
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent-color);
      background: rgba(233, 69, 96, 0.05);
    }
    .drop-zone-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .preview-image {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      margin-top: 1rem;
    }
    .output-textarea {
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>图片 Base64 转换</h1>
      <p>图片与 Base64 编码互相转换</p>
    </div>

    <div class="card">
      <div class="card-title">图片 → Base64</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-zone-icon">📁</div>
        <div>拖拽图片到此处，或点击选择文件</div>
        <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem;">支持 PNG, JPG, GIF, WebP, SVG 等格式</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this.files[0])">
      
      <div id="imagePreview" style="display: none; margin-top: 1rem;">
        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
          <img id="previewImg" class="preview-image">
          <div style="flex: 1; min-width: 200px;">
            <div id="fileInfo" style="color: var(--text-secondary); font-size: 0.9rem;"></div>
          </div>
        </div>
      </div>
      
      <div id="base64Output" style="display: none; margin-top: 1rem;">
        <div class="card-title">Base64 输出</div>
        <textarea id="base64Result" class="output-textarea" readonly style="min-height: 150px;"></textarea>
        <div class="btn-group" style="margin-top: 0.5rem;">
          <button class="btn btn-secondary" onclick="copyBase64()">复制 Base64</button>
          <button class="btn btn-secondary" onclick="copyDataUrl()">复制 Data URL</button>
          <button class="btn btn-secondary" onclick="copyHtml()">复制 HTML 标签</button>
          <button class="btn btn-secondary" onclick="copyCss()">复制 CSS</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Base64 → 图片</div>
      <textarea id="base64Input" class="output-textarea" placeholder="粘贴 Base64 编码或 Data URL..." style="min-height: 100px;"></textarea>
      <div class="btn-group" style="margin-top: 0.5rem;">
        <button class="btn btn-primary" onclick="convertToImage()">转换为图片</button>
        <button class="btn btn-secondary" onclick="downloadImage()">下载图片</button>
      </div>
      <div id="convertedPreview" style="display: none; margin-top: 1rem;">
        <img id="convertedImg" class="preview-image">
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    const dropZone = document.getElementById('dropZone');
    
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      }
    });

    function handleFile(file) {
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        
        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('fileInfo').innerHTML = `
          <div><strong>文件名:</strong> ${file.name}</div>
          <div><strong>类型:</strong> ${file.type}</div>
          <div><strong>大小:</strong> ${formatSize(file.size)}</div>
          <div><strong>Base64 长度:</strong> ${base64.length} 字符</div>
        `;
        
        document.getElementById('base64Result').value = base64;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('base64Output').style.display = 'block';
        
        document.getElementById('base64Result').dataset.dataUrl = dataUrl;
        document.getElementById('base64Result').dataset.type = file.type;
      };
      reader.readAsDataURL(file);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function copyBase64() {
      const base64 = document.getElementById('base64Result').value;
      navigator.clipboard.writeText(base64).then(() => {
        showToast('已复制 Base64！');
      });
    }

    function copyDataUrl() {
      const dataUrl = document.getElementById('base64Result').dataset.dataUrl;
      navigator.clipboard.writeText(dataUrl).then(() => {
        showToast('已复制 Data URL！');
      });
    }

    function copyHtml() {
      const dataUrl = document.getElementById('base64Result').dataset.dataUrl;
      const html = `<img src="${dataUrl}" alt="image">`;
      navigator.clipboard.writeText(html).then(() => {
        showToast('已复制 HTML 标签！');
      });
    }

    function copyCss() {
      const dataUrl = document.getElementById('base64Result').dataset.dataUrl;
      const css = `background-image: url('${dataUrl}');`;
      navigator.clipboard.writeText(css).then(() => {
        showToast('已复制 CSS！');
      });
    }

    function convertToImage() {
      const input = document.getElementById('base64Input').value.trim();
      const preview = document.getElementById('convertedPreview');
      const img = document.getElementById('convertedImg');
      
      if (!input) {
        showToast('请输入 Base64 编码');
        return;
      }
      
      let dataUrl = input;
      if (!input.startsWith('data:')) {
        dataUrl = 'data:image/png;base64,' + input;
      }
      
      img.onerror = () => {
        showToast('无效的图片数据');
        preview.style.display = 'none';
      };
      
      img.onload = () => {
        preview.style.display = 'block';
      };
      
      img.src = dataUrl;
    }

    function downloadImage() {
      const img = document.getElementById('convertedImg');
      if (!img.src || img.src === window.location.href) {
        showToast('请先转换图片');
        return;
      }
      
      const link = document.createElement('a');
      link.download = 'image.png';
      link.href = img.src;
      link.click();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
