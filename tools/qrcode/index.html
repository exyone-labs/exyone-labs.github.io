<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生成器 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      margin-top: 1rem;
    }
    #qrcode {
      margin-bottom: 1rem;
    }
    #qrcode table {
      border-collapse: collapse;
    }
    #qrcode td {
      width: 4px;
      height: 4px;
    }
    #qrcode td.black {
      background: #000;
    }
    #qrcode td.white {
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>二维码生成器</h1>
      <p>将文本或链接转换为二维码</p>
    </div>

    <div class="card">
      <div class="card-title">输入内容</div>
      <textarea id="input" placeholder="输入文本、链接或其他内容..." style="min-height: 100px;"></textarea>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin: 1rem 0;">
        <div>
          <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">尺寸</label>
          <select id="size" style="width: 100%;">
            <option value="4">小 (132px)</option>
            <option value="6" selected>中 (198px)</option>
            <option value="8">大 (264px)</option>
            <option value="10">超大 (330px)</option>
          </select>
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">容错级别</label>
          <select id="level" style="width: 100%;">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
          </select>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateQR()">生成二维码</button>
        <button class="btn btn-secondary" onclick="downloadQR()">下载 PNG</button>
        <button class="btn btn-secondary" onclick="downloadSVG()">下载 SVG</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">二维码预览</div>
      <div class="qr-container" id="qrContainer">
        <div id="qrcode"></div>
        <div id="qrInfo" style="color: #666; font-size: 0.85rem;"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    const QRCode = (function() {
      const ECL = { L: 1, M: 0, Q: 3, H: 2 };
      
      function generate(text, options = {}) {
        const level = options.level || 'M';
        const size = options.size || 6;
        
        const qr = createQR(text, ECL[level]);
        return renderQR(qr, size);
      }
      
      function createQR(text, ecl) {
        const version = getMinVersion(text.length, ecl);
        const size = version * 4 + 17;
        const modules = Array(size).fill(null).map(() => Array(size).fill(null));
        
        addFinderPatterns(modules, size);
        addAlignmentPatterns(modules, version);
        addTimingPatterns(modules, size);
        addDarkModule(modules, version);
        reserveFormatArea(modules, size);
        reserveVersionArea(modules, version);
        
        const data = encodeData(text, version, ecl);
        placeData(modules, data, size);
        applyMask(modules, size, 0);
        
        return modules;
      }
      
      function getMinVersion(length, ecl) {
        const capacities = [17, 32, 53, 78, 106, 134, 154, 192, 230, 271];
        for (let v = 0; v < capacities.length; v++) {
          if (capacities[v] >= length) return v + 1;
        }
        return 10;
      }
      
      function addFinderPatterns(modules, size) {
        for (let i = 0; i < 7; i++) {
          for (let j = 0; j < 7; j++) {
            const val = (i === 0 || i === 6 || j === 0 || j === 6 || (i >= 2 && i <= 4 && j >= 2 && j <= 4)) ? 1 : 0;
            modules[i][j] = val;
            modules[i][size - 1 - j] = val;
            modules[size - 1 - i][j] = val;
          }
        }
      }
      
      function addAlignmentPatterns(modules, version) {
        if (version < 2) return;
        const positions = getAlignmentPositions(version);
        for (const row of positions) {
          for (const col of positions) {
            if (modules[row][col] === null) {
              for (let i = -2; i <= 2; i++) {
                for (let j = -2; j <= 2; j++) {
                  const val = (Math.abs(i) === 2 || Math.abs(j) === 2 || (i === 0 && j === 0)) ? 1 : 0;
                  modules[row + i][col + j] = val;
                }
              }
            }
          }
        }
      }
      
      function getAlignmentPositions(version) {
        if (version === 1) return [];
        const intervals = [6, 18, 22, 26, 30, 34, 38, 42, 46, 50];
        return [6, intervals[version - 2]];
      }
      
      function addTimingPatterns(modules, size) {
        for (let i = 8; i < size - 8; i++) {
          modules[6][i] = modules[i][6] = i % 2 === 0 ? 1 : 0;
        }
      }
      
      function addDarkModule(modules, version) {
        modules[size - 7][8] = 1;
      }
      
      function reserveFormatArea(modules, size) {
        for (let i = 0; i < 9; i++) {
          if (modules[8][i] === null) modules[8][i] = 0;
          if (modules[i][8] === null) modules[i][8] = 0;
          if (modules[8][size - 1 - i] === null) modules[8][size - 1 - i] = 0;
          if (modules[size - 1 - i][8] === null) modules[size - 1 - i][8] = 0;
        }
        modules[8][8] = 0;
      }
      
      function reserveVersionArea(modules, version) {
        if (version < 7) return;
        for (let i = 0; i < 6; i++) {
          for (let j = 0; j < 3; j++) {
            modules[i][size - 11 + j] = 0;
            modules[size - 11 + j][i] = 0;
          }
        }
      }
      
      function encodeData(text, version, ecl) {
        const bytes = new TextEncoder().encode(text);
        const bits = [];
        bits.push(0, 1, 0, 0);
        bits.push(...toBits(bytes.length, 8));
        for (const byte of bytes) {
          bits.push(...toBits(byte, 8));
        }
        const totalBits = getTotalBits(version, ecl);
        const padCount = Math.floor((totalBits - bits.length) / 8);
        for (let i = 0; i < padCount; i++) {
          bits.push(...toBits(i % 2 === 0 ? 236 : 17, 8));
        }
        return bits;
      }
      
      function toBits(num, length) {
        const bits = [];
        for (let i = length - 1; i >= 0; i--) {
          bits.push((num >> i) & 1);
        }
        return bits;
      }
      
      function getTotalBits(version, ecl) {
        return (version * 4 + 17) ** 2;
      }
      
      function placeData(modules, data, size) {
        let idx = 0;
        for (let col = size - 1; col >= 0; col -= 2) {
          if (col === 6) col = 5;
          for (let row = 0; row < size; row++) {
            for (let c = 0; c < 2; c++) {
              const x = col - c;
              if (modules[row][x] === null) {
                modules[row][x] = idx < data.length ? data[idx++] : 0;
              }
            }
          }
        }
      }
      
      function applyMask(modules, size, pattern) {
        for (let row = 0; row < size; row++) {
          for (let col = 0; col < size; col++) {
            if (modules[row][col] !== null && !isReserved(row, col, size)) {
              modules[row][col] ^= getMaskBit(row, col, pattern);
            }
          }
        }
      }
      
      function isReserved(row, col, size) {
        return (row < 9 && col < 9) || (row < 9 && col >= size - 8) || (row >= size - 8 && col < 9) ||
               (row === 6 || col === 6);
      }
      
      function getMaskBit(row, col, pattern) {
        return (row + col) % 2 === 0 ? 1 : 0;
      }
      
      function renderQR(modules, cellSize) {
        const size = modules.length;
        let html = '<table>';
        for (let row = 0; row < size; row++) {
          html += '<tr>';
          for (let col = 0; col < size; col++) {
            const cls = modules[row][col] ? 'black' : 'white';
            html += `<td class="${cls}" style="width:${cellSize}px;height:${cellSize}px;"></td>`;
          }
          html += '</tr>';
        }
        html += '</table>';
        return html;
      }
      
      return { generate };
    })();

    function generateQR() {
      const input = document.getElementById('input').value;
      const size = parseInt(document.getElementById('size').value);
      const level = document.getElementById('level').value;
      const container = document.getElementById('qrcode');
      const info = document.getElementById('qrInfo');
      
      if (!input) {
        container.innerHTML = '<div style="color: #999;">请输入内容</div>';
        info.textContent = '';
        return;
      }
      
      try {
        container.innerHTML = QRCode.generate(input, { level, size });
        info.textContent = `内容长度: ${input.length} 字符`;
      } catch (e) {
        container.innerHTML = '<div style="color: #f44336;">生成失败: ' + e.message + '</div>';
        info.textContent = '';
      }
    }

    function downloadQR() {
      const canvas = document.createElement('canvas');
      const table = document.querySelector('#qrcode table');
      if (!table) {
        showToast('请先生成二维码');
        return;
      }
      
      const cells = table.querySelectorAll('td');
      const size = Math.sqrt(cells.length);
      const cellSize = 10;
      canvas.width = size * cellSize;
      canvas.height = size * cellSize;
      const ctx = canvas.getContext('2d');
      
      cells.forEach((cell, i) => {
        const row = Math.floor(i / size);
        const col = i % size;
        ctx.fillStyle = cell.classList.contains('black') ? '#000' : '#fff';
        ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
      });
      
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadSVG() {
      const table = document.querySelector('#qrcode table');
      if (!table) {
        showToast('请先生成二维码');
        return;
      }
      
      const cells = table.querySelectorAll('td');
      const size = Math.sqrt(cells.length);
      const cellSize = 10;
      
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size * cellSize}" height="${size * cellSize}">`;
      svg += `<rect width="100%" height="100%" fill="white"/>`;
      
      cells.forEach((cell, i) => {
        if (cell.classList.contains('black')) {
          const row = Math.floor(i / size);
          const col = i % size;
          svg += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="black"/>`;
        }
      });
      
      svg += '</svg>';
      
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'qrcode.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    document.getElementById('input').addEventListener('input', generateQR);
    document.getElementById('size').addEventListener('change', generateQR);
    document.getElementById('level').addEventListener('change', generateQR);
  </script>
</body>
</html>
