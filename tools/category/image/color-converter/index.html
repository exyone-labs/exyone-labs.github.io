---
layout: none
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>颜色转换 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
  <style>
    .color-preview {
      width: 100%;
      height: 100px;
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      border: 1px solid var(--border-color);
    }
    .color-inputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .color-input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .color-input-group label {
      font-weight: 600;
      color: var(--text-secondary);
    }
    .color-input-group input {
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  
{% raw %}
<script>
    const toolId = 'color-converter';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('tools.color-converter.pickColor')}</div>
            <input type="color" id="colorPicker" value="#e94560" onchange="updateFromPicker()" style="width: 100%; height: 50px; cursor: pointer;">
            <div id="colorPreview" class="color-preview" style="background: #e94560;"></div>
          </div>

          <div class="card">
            <div class="card-title">颜色�?/div>
            <div class="color-inputs">
              <div class="color-input-group">
                <label>${AppConfig.t('tools.color-converter.hex')}</label>
                <input type="text" id="hex" value="#e94560" oninput="updateFromHex()">
              </div>
              <div class="color-input-group">
                <label>${AppConfig.t('tools.color-converter.rgb')}</label>
                <input type="text" id="rgb" value="rgb(233, 69, 96)" oninput="updateFromRgb()">
              </div>
              <div class="color-input-group">
                <label>${AppConfig.t('tools.color-converter.hsl')}</label>
                <input type="text" id="hsl" value="hsl(350, 78%, 59%)" oninput="updateFromHsl()">
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function updateFromPicker() {
      const hex = document.getElementById('colorPicker').value;
      document.getElementById('hex').value = hex;
      updateFromHex();
    }

    function updateFromHex() {
      let hex = document.getElementById('hex').value.trim();
      if (!hex.startsWith('#')) hex = '#' + hex;
      
      if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;

      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);

      document.getElementById('rgb').value = `rgb(${r}, ${g}, ${b})`;
      document.getElementById('hsl').value = rgbToHsl(r, g, b);
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('colorPicker').value = hex;
    }

    function updateFromRgb() {
      const rgb = document.getElementById('rgb').value.trim();
      const match = rgb.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
      if (!match) return;

      const r = parseInt(match[1]);
      const g = parseInt(match[2]);
      const b = parseInt(match[3]);

      const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
      document.getElementById('hex').value = hex;
      document.getElementById('hsl').value = rgbToHsl(r, g, b);
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('colorPicker').value = hex;
    }

    function updateFromHsl() {
      const hsl = document.getElementById('hsl').value.trim();
      const match = hsl.match(/hsl\s*\(\s*(\d+)\s*,\s*(\d+)%?\s*,\s*(\d+)%?\s*\)/i);
      if (!match) return;

      const h = parseInt(match[1]);
      const s = parseInt(match[2]) / 100;
      const l = parseInt(match[3]) / 100;

      const rgb = hslToRgb(h, s, l);
      const hex = '#' + rgb.map(x => x.toString(16).padStart(2, '0')).join('');
      
      document.getElementById('hex').value = hex;
      document.getElementById('rgb').value = `rgb(${rgb.join(', ')})`;
      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('colorPicker').value = hex;
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }

      return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
    }

    function hslToRgb(h, s, l) {
      let r, g, b;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;

      if (h < 60) { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }

      return [
        Math.round((r + m) * 255),
        Math.round((g + m) * 255),
        Math.round((b + m) * 255)
      ];
    }

    init();
  </script>
{% endraw %}

</body>
</html>
