---
layout: none
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicode 转换 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script src="../../../utils/core.js"></script>

  
{% raw %}
<script>
    const toolId = 'unicode';

    async function init() {
      await AppConfig.init();
      render();
    }

    function render() {
      const tool = AppConfig.getToolById(toolId);
      document.getElementById('app').innerHTML = `
        ${UI.renderNavbar()}
        <div class="container">
          <div class="header">
            <h1>${tool.name}</h1>
            <p>${tool.description}</p>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.input')}</div>
            <textarea id="input" placeholder="输入文本�?Unicode 编码..."></textarea>
            
            <div class="btn-group">
              <button class="btn btn-primary" onclick="textToUnicode()">${AppConfig.t('tools.unicode.textToUnicode')}</button>
              <button class="btn btn-primary" onclick="unicodeToText()">${AppConfig.t('tools.unicode.unicodeToText')}</button>
              <button class="btn btn-secondary" onclick="textToCodePoints()">${AppConfig.t('tools.unicode.showCodePoints')}</button>
              <button class="btn btn-secondary" onclick="copyResult()">${AppConfig.t('common.copy')}</button>
              <button class="btn btn-secondary" onclick="clearAll()">${AppConfig.t('common.clear')}</button>
            </div>
          </div>

          <div class="card">
            <div class="card-title">${AppConfig.t('common.output')}</div>
            <div id="output" class="output" style="font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
          </div>

          <div class="card">
            <div class="card-title">格式说明</div>
            <div style="color: var(--text-secondary); line-height: 1.8; font-size: 0.9rem;">
              <p><strong>\\uXXXX</strong> - JavaScript 风格 Unicode 转义</p>
              <p><strong>&amp;#XXXX;</strong> - HTML 实体编码</p>
              <p><strong>U+XXXX</strong> - Unicode 码点表示</p>
            </div>
          </div>
        </div>
      `;
    }

    function textToUnicode() {
      const input = document.getElementById('input').value;
      if (!input) {
        UI.setOutput('output', '请输入文本本�?, 'error');
        return;
      }
      const unicode = input.split('').map(char => {
        const code = char.codePointAt(0);
        if (code > 0xFFFF) {
          return '\\u' + ((code >> 10) + 0xD7C0).toString(16).padStart(4, '0') + 
                 '\\u' + ((code & 0x3FF) + 0xDC00).toString(16).padStart(4, '0');
        }
        return '\\u' + code.toString(16).padStart(4, '0');
      }).join('');
      UI.setOutput('output', unicode, 'success');
    }

    function unicodeToText() {
      const input = document.getElementById('input').value.trim();
      if (!input) {
        UI.setOutput('output', '请输�?Unicode 编码', 'error');
        return;
      }
      try {
        let text = input;
        text = text.replace(/\\u([0-9a-fA-F]{4})/g, (m, hex) => String.fromCharCode(parseInt(hex, 16)));
        text = text.replace(/&#([0-9]+);/g, (m, dec) => String.fromCodePoint(parseInt(dec, 10)));
        text = text.replace(/&#x([0-9a-fA-F]+);/g, (m, hex) => String.fromCodePoint(parseInt(hex, 16)));
        text = text.replace(/U\+([0-9a-fA-F]+)/g, (m, hex) => String.fromCodePoint(parseInt(hex, 16)));
        UI.setOutput('output', text, 'success');
      } catch (e) {
        UI.setOutput('output', '转换错误: ' + e.message, 'error');
      }
    }

    function textToCodePoints() {
      const input = document.getElementById('input').value;
      if (!input) {
        UI.setOutput('output', '请输入文本本�?, 'error');
        return;
      }
      const codePoints = [...input].map(char => {
        const code = char.codePointAt(0);
        return `U+${code.toString(16).toUpperCase().padStart(4, '0')} (${char})`;
      });
      UI.setOutput('output', codePoints.join('\n'), 'success');
    }

    function copyResult() {
      const output = document.getElementById('output').textContent;
      if (output && !output.startsWith('�?)) {
        UI.copy(output);
      }
    }

    function clearAll() {
      document.getElementById('input').value = '';
      UI.clear('output');
    }

    init();
  </script>
{% endraw %}

</body>
</html>
