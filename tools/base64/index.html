<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder/Decoder - Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
    
    <div class="header">
      <h1>Base64 Encoder/Decoder</h1>
      <p>Encode and decode text using Base64 encoding</p>
    </div>

    <div class="card">
      <div class="card-title">Input</div>
      <textarea id="input" placeholder="Enter text to encode or decode..."></textarea>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encodeBase64()">Encode</button>
        <button class="btn btn-primary" onclick="decodeBase64()">Decode</button>
        <button class="btn btn-secondary" onclick="copyOutput()">Copy Output</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Output</div>
      <div id="output" class="output"></div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    function encodeBase64() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = 'Please enter text to encode';
        return;
      }
      
      try {
        const encoded = btoa(unescape(encodeURIComponent(input)));
        output.className = 'output success';
        output.textContent = encoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = 'Encoding error: ' + e.message;
      }
    }

    function decodeBase64() {
      const input = document.getElementById('input').value.trim();
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = 'Please enter Base64 string to decode';
        return;
      }
      
      try {
        const decoded = decodeURIComponent(escape(atob(input)));
        output.className = 'output success';
        output.textContent = decoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = 'Invalid Base64 string: ' + e.message;
      }
    }

    function copyOutput() {
      const output = document.getElementById('output').textContent;
      if (!output || output.startsWith('Please') || output.startsWith('Invalid') || output.startsWith('Encoding error')) return;
      
      navigator.clipboard.writeText(output).then(() => {
        showToast('Copied to clipboard!');
      });
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').textContent = '';
      document.getElementById('output').className = 'output';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
