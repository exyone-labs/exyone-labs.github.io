<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 编解码 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>URL 编解码</h1>
      <p>对 URL 进行编码和解码操作</p>
    </div>

    <div class="card">
      <div class="card-title">输入</div>
      <textarea id="input" placeholder="输入需要编码或解码的 URL..."></textarea>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encodeURL()">编码 (Encode)</button>
        <button class="btn btn-primary" onclick="decodeURL()">解码 (Decode)</button>
        <button class="btn btn-secondary" onclick="encodeComponent()">编码组件</button>
        <button class="btn btn-secondary" onclick="decodeComponent()">解码组件</button>
        <button class="btn btn-secondary" onclick="copyOutput()">复制结果</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">输出</div>
      <div id="output" class="output"></div>
    </div>

    <div class="card">
      <div class="card-title">说明</div>
      <div style="color: var(--text-secondary); line-height: 1.8;">
        <p><strong>encodeURI:</strong> 编码完整 URL，保留特殊字符如 <code>:/?#&amp;=</code></p>
        <p><strong>encodeURIComponent:</strong> 编码 URL 组件，编码所有特殊字符</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    function encodeURL() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请输入需要编码的 URL';
        return;
      }
      
      try {
        const encoded = encodeURI(input);
        output.className = 'output success';
        output.textContent = encoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = '编码错误: ' + e.message;
      }
    }

    function decodeURL() {
      const input = document.getElementById('input').value.trim();
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请输入需要解码的 URL';
        return;
      }
      
      try {
        const decoded = decodeURI(input);
        output.className = 'output success';
        output.textContent = decoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = '解码错误: 无效的编码 URL';
      }
    }

    function encodeComponent() {
      const input = document.getElementById('input').value;
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请输入需要编码的内容';
        return;
      }
      
      try {
        const encoded = encodeURIComponent(input);
        output.className = 'output success';
        output.textContent = encoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = '编码错误: ' + e.message;
      }
    }

    function decodeComponent() {
      const input = document.getElementById('input').value.trim();
      const output = document.getElementById('output');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请输入需要解码的内容';
        return;
      }
      
      try {
        const decoded = decodeURIComponent(input);
        output.className = 'output success';
        output.textContent = decoded;
      } catch (e) {
        output.className = 'output error';
        output.textContent = '解码错误: 无效的编码字符串';
      }
    }

    function copyOutput() {
      const output = document.getElementById('output').textContent;
      if (!output || output.startsWith('请') || output.startsWith('编码') || output.startsWith('解码')) return;
      
      navigator.clipboard.writeText(output).then(() => {
        showToast('已复制到剪贴板！');
      });
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').textContent = '';
      document.getElementById('output').className = 'output';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
