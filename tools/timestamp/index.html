<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间戳转换 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>时间戳转换</h1>
      <p>时间戳与日期格式互相转换</p>
    </div>

    <div class="card">
      <div class="card-title">当前时间</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <div class="time-box">
          <label>时间戳 (秒)</label>
          <input type="text" id="currentTimestamp" readonly>
        </div>
        <div class="time-box">
          <label>时间戳 (毫秒)</label>
          <input type="text" id="currentTimestampMs" readonly>
        </div>
        <div class="time-box">
          <label>ISO 格式</label>
          <input type="text" id="currentISO" readonly>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">时间戳 → 日期</div>
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <input type="text" id="timestampInput" placeholder="输入时间戳 (秒或毫秒)" style="flex: 1; min-width: 200px;">
        <button class="btn btn-primary" onclick="timestampToDate()">转换</button>
      </div>
      <div id="dateOutput" class="output"></div>
    </div>

    <div class="card">
      <div class="card-title">日期 → 时间戳</div>
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
        <input type="datetime-local" id="dateInput" style="flex: 1; min-width: 200px;">
        <button class="btn btn-primary" onclick="dateToTimestamp()">转换</button>
      </div>
      <div id="timestampOutput" class="output"></div>
    </div>

    <div class="card">
      <div class="card-title">快捷操作</div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="setNow()">设为当前时间</button>
        <button class="btn btn-secondary" onclick="copyTimestamp()">复制时间戳</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <style>
    .time-box {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 8px;
    }
    .time-box label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .time-box input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: monospace;
    }
  </style>

  <script>
    function updateCurrentTime() {
      const now = new Date();
      document.getElementById('currentTimestamp').value = Math.floor(now.getTime() / 1000);
      document.getElementById('currentTimestampMs').value = now.getTime();
      document.getElementById('currentISO').value = now.toISOString();
    }

    function timestampToDate() {
      const input = document.getElementById('timestampInput').value.trim();
      const output = document.getElementById('dateOutput');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请输入时间戳';
        return;
      }
      
      let timestamp = parseInt(input);
      if (isNaN(timestamp)) {
        output.className = 'output error';
        output.textContent = '无效的时间戳';
        return;
      }
      
      if (input.length <= 10) {
        timestamp *= 1000;
      }
      
      const date = new Date(timestamp);
      if (isNaN(date.getTime())) {
        output.className = 'output error';
        output.textContent = '无效的时间戳';
        return;
      }
      
      const formats = [
        `本地时间: ${date.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`,
        `ISO 格式: ${date.toISOString()}`,
        `UTC 时间: ${date.toUTCString()}`,
        `时间戳(秒): ${Math.floor(date.getTime() / 1000)}`,
        `时间戳(毫秒): ${date.getTime()}`,
        `年份: ${date.getFullYear()}`,
        `月份: ${date.getMonth() + 1}`,
        `日期: ${date.getDate()}`,
        `星期: ${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]}`
      ];
      
      output.className = 'output success';
      output.innerHTML = formats.map(f => `<div>${f}</div>`).join('');
    }

    function dateToTimestamp() {
      const input = document.getElementById('dateInput').value;
      const output = document.getElementById('timestampOutput');
      
      if (!input) {
        output.className = 'output error';
        output.textContent = '请选择日期时间';
        return;
      }
      
      const date = new Date(input);
      if (isNaN(date.getTime())) {
        output.className = 'output error';
        output.textContent = '无效的日期';
        return;
      }
      
      const timestamp = date.getTime();
      output.className = 'output success';
      output.innerHTML = `
        <div>时间戳 (秒): <strong>${Math.floor(timestamp / 1000)}</strong></div>
        <div>时间戳 (毫秒): <strong>${timestamp}</strong></div>
        <div>ISO 格式: ${date.toISOString()}</div>
      `;
    }

    function setNow() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      const local = new Date(now - offset);
      document.getElementById('dateInput').value = local.toISOString().slice(0, 16);
      document.getElementById('timestampInput').value = Math.floor(now.getTime() / 1000);
    }

    function copyTimestamp() {
      const ts = document.getElementById('currentTimestamp').value;
      navigator.clipboard.writeText(ts).then(() => {
        showToast('已复制时间戳！');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    updateCurrentTime();
    setInterval(updateCurrentTime, 1000);
    setNow();
  </script>
</body>
</html>
