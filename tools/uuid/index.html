<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UUID 生成器 - Developer Tools</title>
  <link rel="stylesheet" href="{{ '/assets/css/tools.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← 返回工具箱</a>
    
    <div class="header">
      <h1>UUID 生成器</h1>
      <p>生成 UUID/GUID 标识符</p>
    </div>

    <div class="card">
      <div class="card-title">配置</div>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
        <div>
          <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">版本</label>
          <select id="version" style="width: 100%;">
            <option value="v4">UUID v4 (随机)</option>
            <option value="v1">UUID v1 (时间戳)</option>
          </select>
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">格式</label>
          <select id="format" style="width: 100%;">
            <option value="default">带连字符</option>
            <option value="nohyphen">无连字符</option>
            <option value="braces">带花括号</option>
            <option value="uppercase">大写</option>
          </select>
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">数量</label>
          <input type="number" id="count" value="1" min="1" max="100" style="width: 100%;">
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateUUID()">生成</button>
        <button class="btn btn-secondary" onclick="copyAll()">复制全部</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">生成的 UUID</div>
      <div id="output" class="output" style="min-height: 100px; font-family: monospace; white-space: pre-wrap;"></div>
    </div>

    <div class="card">
      <div class="card-title">单个 UUID</div>
      <div style="display: flex; gap: 1rem; align-items: center;">
        <input type="text" id="singleUUID" readonly style="flex: 1; font-family: monospace;">
        <button class="btn btn-secondary" onclick="copySingle()">复制</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板！</div>

  <script>
    function generateUUIDv4() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function generateUUIDv1() {
      const now = Date.now();
      const timeLow = (now & 0xFFFFFFFF).toString(16).padStart(8, '0');
      const timeMid = ((now >>> 32) & 0xFFFF).toString(16).padStart(4, '0');
      const timeHi = (((now >>> 48) & 0x0FFF) | 0x1000).toString(16).padStart(4, '0');
      const clockSeq = (Math.random() * 0x3FFF | 0x8000).toString(16).padStart(4, '0');
      const node = Array.from({length: 6}, () => Math.floor(Math.random() * 256).toString(16).padStart(2, '0')).join('');
      
      return `${timeLow}-${timeMid}-${timeHi}-${clockSeq}-${node}`;
    }

    function formatUUID(uuid, format) {
      switch (format) {
        case 'nohyphen':
          return uuid.replace(/-/g, '');
        case 'braces':
          return `{${uuid}}`;
        case 'uppercase':
          return uuid.toUpperCase();
        default:
          return uuid;
      }
    }

    function generateUUID() {
      const version = document.getElementById('version').value;
      const format = document.getElementById('format').value;
      const count = parseInt(document.getElementById('count').value) || 1;
      const output = document.getElementById('output');
      
      const generator = version === 'v1' ? generateUUIDv1 : generateUUIDv4;
      const uuids = [];
      
      for (let i = 0; i < Math.min(count, 100); i++) {
        uuids.push(formatUUID(generator(), format));
      }
      
      output.className = 'output success';
      output.textContent = uuids.join('\n');
      
      document.getElementById('singleUUID').value = uuids[0];
    }

    function copyAll() {
      const output = document.getElementById('output').textContent;
      if (!output) return;
      
      navigator.clipboard.writeText(output).then(() => {
        showToast('已复制全部 UUID！');
      });
    }

    function copySingle() {
      const uuid = document.getElementById('singleUUID').value;
      if (!uuid) return;
      
      navigator.clipboard.writeText(uuid).then(() => {
        showToast('已复制 UUID！');
      });
    }

    function clearAll() {
      document.getElementById('output').textContent = '';
      document.getElementById('singleUUID').value = '';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    generateUUID();
  </script>
</body>
</html>
